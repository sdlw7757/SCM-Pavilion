name: 抓取数据并部署

on:
  push:
    branches:
      - main
      - master
  schedule:
    # 每天 UTC 16:00 = 北京时间 0:00 运行一次
    - cron: '0 16 * * *'
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write

concurrency:
  group: scrape-and-deploy
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    if: github.event_name != 'push' || github.event.head_commit.author.name != 'winorigin-bot'
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行数据抓取脚本
        id: scrape
        run: |
          python scripts/scraper.py || echo "爬虫执行完成（部分数据源可能不可用）"
          if [ ! -f data/meta.json ]; then
            echo "::warning::meta.json 不存在，爬虫可能完全失败"
            echo "has_data=false" >> $GITHUB_OUTPUT
          else
            TOTAL=$(python3 -c "import json; print(json.load(open('data/meta.json'))['totalProducts'])")
            if [ "$TOTAL" -eq 0 ] 2>/dev/null; then
              echo "::warning::totalProducts=0，无有效数据"
              echo "has_data=false" >> $GITHUB_OUTPUT
            else
              echo "has_data=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 更新时间戳
        if: steps.scrape.outputs.has_data == 'true'
        run: |
          BJ_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          BJ_DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          if [ -f data/meta.json ]; then
            python3 -c "
          import json
          with open('data/meta.json','r',encoding='utf-8') as f: m=json.load(f)
          m['lastUpdatedPrecise']='$BJ_TIME'
          m['lastUpdated']='$BJ_DATE'
          with open('data/meta.json','w',encoding='utf-8') as f: json.dump(m,f,ensure_ascii=False,indent=2)
          "
          else
            mkdir -p data
            python3 -c "
          import json
          m={'lastUpdatedPrecise':'$BJ_TIME','lastUpdated':'$BJ_DATE','totalProducts':0,'recentUpdates':0,'categories':{},'sourceTracking':{}}
          with open('data/meta.json','w',encoding='utf-8') as f: json.dump(m,f,ensure_ascii=False,indent=2)
          "
          fi

      - name: 提交并推送数据更新
        if: steps.scrape.outputs.has_data == 'true'
        run: |
          git config user.name "winorigin-bot"
          git config user.email "bot@winorigin.github.io"
          git add data/
          git diff --cached --quiet || git commit -m "bot: 自动抓取更新 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M') [skip ci]"
          n=0; until [ "$n" -ge 3 ]; do git push && break; n=$((n+1)); echo "推送失败，第${n}次重试..."; sleep 5; done

      - name: 部署到 gh-pages 分支
        if: steps.scrape.outputs.has_data == 'true'
        run: |
          DEPLOY_DIR=$(mktemp -d)
          for f in assets css js pages data index.html sitemap.xml robots.txt _headers; do
            [ -e "$f" ] && cp -r "$f" "$DEPLOY_DIR/"
          done
          cd "$DEPLOY_DIR"
          git init
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git config user.name "winorigin-bot"
          git config user.email "bot@winorigin.github.io"
          git add -A
          git commit -m "deploy: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          n=0; until [ "$n" -ge 3 ]; do git push origin HEAD:gh-pages --force && break; n=$((n+1)); echo "部署推送失败，第${n}次重试..."; sleep 5; done

      - name: 推送新内容到百度
        env:
          BAIDU_TOKEN: ${{ secrets.BAIDU_TOKEN }}
        if: steps.scrape.outputs.has_data == 'true' && env.BAIDU_TOKEN != ''
        run: |
          if [ ! -f sitemap.xml ]; then
            echo "sitemap.xml not found, skip baidu push"
            exit 0
          fi
          URLS=$(python3 -c "
          import xml.etree.ElementTree as ET, sys
          ns = {'sm': 'http://www.sitemaps.org/schemas/sitemap/0.9'}
          try:
              urls = [e.text for e in ET.parse('sitemap.xml').findall('.//sm:url/sm:loc', ns)]
              print('\n'.join(urls))
          except Exception:
              print('', file=sys.stderr)
              sys.exit(1)
          ")
          if [ -n "$URLS" ]; then
            curl -k -H "Content-Type: text/plain" \
              --data "$URLS" \
              "https://data.zz.baidu.com/urls?site=https://517757.xyz&token=$BAIDU_TOKEN"
          else
            echo "No urls found in sitemap.xml, skip push"
          fi
