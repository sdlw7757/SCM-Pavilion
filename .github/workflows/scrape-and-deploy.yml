name: 抓取数据并部署

on:
  push:
    branches:
      - main
      - master
  schedule:
    # 每天 UTC 6:00 = 北京时间 14:00 运行一次
    - cron: '0 6 * * *'
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行数据抓取脚本
        run: |
          python scripts/scraper.py || echo "爬虫执行完成（部分数据源可能不可用）"

      - name: 提交并推送数据更新
        run: |
          git config user.name "winorigin-bot"
          git config user.email "bot@winorigin.github.io"
          git add data/
          git diff --cached --quiet || git commit -m "bot: 自动抓取更新 $(date +'%Y-%m-%d %H:%M') [skip ci]"
          git push

      - name: 部署到 gh-pages 分支
        run: |
          git config user.name "winorigin-bot"
          git config user.email "bot@winorigin.github.io"
          git add -A
          git commit --allow-empty -m "deploy: $(date +'%Y-%m-%d %H:%M')"
          git push origin HEAD:gh-pages --force

      - name: 推送新内容到百度
        env:
          BAIDU_TOKEN: ${{ secrets.BAIDU_TOKEN }}
        if: env.BAIDU_TOKEN != ''
        run: |
          URLS="https://517757.xyz/
          https://517757.xyz/sitemap.xml
          https://517757.xyz/pages/win11.html
          https://517757.xyz/pages/win10.html
          https://517757.xyz/pages/win8.html
          https://517757.xyz/pages/win7.html
          https://517757.xyz/pages/server.html
          https://517757.xyz/pages/office.html
          https://517757.xyz/pages/guide.html"
          curl -k -H "Content-Type: text/plain" \
            --data "$URLS" \
            "https://data.zz.baidu.com/urls?site=https://517757.xyz&token=${{ secrets.BAIDU_TOKEN }}"